<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>FBO Finder</title>
  <style>
    * { box-sizing: border-box; }
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: #f5f7fb;
      color: #1f2937;
    }
    .wrap {
      max-width: 980px;
      margin: 0 auto;
      padding: 24px 16px 48px;
    }
    .card {
      background: #fff;
      border-radius: 16px;
      padding: 20px;
      box-shadow: 0 6px 20px rgba(0,0,0,0.08);
      margin-bottom: 18px;
    }
    h1, h2 { margin: 0 0 8px; }
    h1 { font-size: 28px; }
    h2 { font-size: 22px; }
    .sub {
      margin: 0 0 20px;
      color: #6b7280;
      font-size: 14px;
    }
    .search-row {
      display: flex;
      gap: 10px;
      flex-wrap: wrap;
      margin-bottom: 18px;
    }
    input[type="text"] {
      flex: 1;
      min-width: 220px;
      height: 46px;
      border: 1px solid #d1d5db;
      border-radius: 12px;
      padding: 0 14px;
      font-size: 16px;
      text-transform: uppercase;
    }
    button {
      height: 46px;
      border: none;
      border-radius: 12px;
      padding: 0 18px;
      font-size: 15px;
      font-weight: 600;
      cursor: pointer;
    }
    .primary-btn {
      background: #2563eb;
      color: white;
    }
    .primary-btn:hover {
      background: #1d4ed8;
    }
    .danger-btn {
      background: #ef4444;
      color: white;
    }
    .danger-btn:hover {
      background: #dc2626;
    }
    .mini-btn {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      min-height: 38px;
      border: none;
      border-radius: 10px;
      padding: 8px 12px;
      font-size: 13px;
      font-weight: 700;
      cursor: pointer;
      text-decoration: none;
    }
    .fav-btn {
      background: #f59e0b;
      color: white;
    }
    .fav-btn:hover {
      background: #d97706;
    }
    .remove-btn {
      background: #ef4444;
      color: white;
    }
    .remove-btn:hover {
      background: #dc2626;
    }
    .call-btn {
      background: #10b981;
      color: white;
    }
    .call-btn:hover {
      background: #059669;
    }
    .status {
      margin: 10px 0 0;
      font-size: 14px;
      color: #6b7280;
    }
    .result-head {
      margin-top: 24px;
      margin-bottom: 14px;
    }
    .icao {
      display: inline-block;
      padding: 5px 10px;
      border-radius: 999px;
      background: #e0ecff;
      color: #1d4ed8;
      font-size: 13px;
      font-weight: 700;
      margin-bottom: 10px;
    }
    .airport-name {
      font-size: 24px;
      font-weight: 700;
      margin: 0 0 8px;
    }
    .count {
      color: #6b7280;
      font-size: 14px;
    }
    .fbo-list {
      display: grid;
      gap: 12px;
      margin-top: 18px;
    }
    .fbo-item {
      border: 1px solid #e5e7eb;
      border-radius: 14px;
      padding: 16px;
      background: #fafafa;
    }
    .fbo-name {
      font-size: 18px;
      font-weight: 700;
      margin-bottom: 8px;
    }
    .phone-text {
      font-size: 15px;
      color: #111827;
      word-break: break-all;
      margin-bottom: 12px;
    }
    .action-row {
      display: flex;
      gap: 8px;
      flex-wrap: wrap;
    }
    .empty {
      margin-top: 8px;
      padding: 16px;
      border-radius: 12px;
      background: #fff7ed;
      color: #9a3412;
      border: 1px solid #fdba74;
    }
    .fav-head {
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 10px;
      flex-wrap: wrap;
      margin-bottom: 12px;
    }
    .fav-list {
      display: grid;
      gap: 10px;
    }
    .fav-item {
      display: flex;
      justify-content: space-between;
      align-items: flex-start;
      gap: 12px;
      flex-wrap: wrap;
      border: 1px solid #e5e7eb;
      border-radius: 14px;
      padding: 14px;
      background: #f9fafb;
    }
    .fav-main {
      flex: 1;
      min-width: 220px;
    }
    .fav-route-line {
      font-size: 16px;
      font-weight: 700;
      margin-bottom: 5px;
    }
    .fav-airport-name {
      color: #6b7280;
      font-size: 13px;
    }
    .fav-actions {
      display: flex;
      gap: 8px;
      flex-wrap: wrap;
    }
    .footer-note {
      margin-top: 18px;
      font-size: 12px;
      color: #6b7280;
      line-height: 1.5;
    }
    .loading-box {
      margin-top: 10px;
      padding: 14px;
      border-radius: 12px;
      background: #eff6ff;
      border: 1px solid #bfdbfe;
      color: #1d4ed8;
      font-size: 14px;
    }
    @media (max-width: 640px) {
      h1 { font-size: 24px; }
      h2 { font-size: 20px; }
      .airport-name { font-size: 20px; }
      .fav-item, .action-row {
        align-items: stretch;
      }
      .fav-actions, .action-row {
        width: 100%;
      }
      .fav-actions .mini-btn, .action-row .mini-btn {
        flex: 1;
        text-align: center;
      }
    }
  </style>
</head>
<body>
  <div class="wrap">

    <div class="card">
      <div class="fav-head">
        <div>
          <h2>Shared Favorites Route</h2>
          <div class="sub" style="margin:0;">
            Shared favorites are visible to everyone using this page.
          </div>
        </div>
        <button id="resetFavoritesBtn" class="danger-btn">Reset Favorites</button>
      </div>
      <div id="favoritesBox"></div>
    </div>

    <div class="card">
      <h1>FBO Finder</h1>
      <p class="sub">Enter a 4-letter ICAO code to see FBO names and phone numbers.</p>

      <div class="search-row">
        <input type="text" id="icaoInput" maxlength="4" placeholder="e.g. RKSS, PANC, KEWR" />
        <button id="searchBtn" class="primary-btn">Search</button>
      </div>

      <div class="status" id="status">Ready.</div>
      <div id="result"></div>

      <div class="footer-note">
        Clicking Call adds <b>00700</b> before dialing.
        Example: <code>+1 705-779-3977</code> → <code>0070017057793977</code>
      </div>
    </div>

  </div>

  <script>
    const SCRIPT_URL = "https://script.google.com/macros/s/AKfycbwR5WaX79FuH4SihUMo68ggrirel-hcRzekMvud_r6MLdsD3jrkpA9LqwkVzVRwvr6n/exec";

    const icaoInput = document.getElementById("icaoInput");
    const searchBtn = document.getElementById("searchBtn");
    const statusEl = document.getElementById("status");
    const resultEl = document.getElementById("result");
    const favoritesBox = document.getElementById("favoritesBox");
    const resetFavoritesBtn = document.getElementById("resetFavoritesBtn");

  function sanitizeDialNumber(phone) {
  if (!phone) return "";

  const raw = String(phone).trim();
  if (!raw) return "";

  // 공백/하이픈/괄호 제거, 맨 앞 + 는 일단 유지
  let normalized = raw.replace(/[\s\-\(\)]/g, "");

  // 1) 한국 국제번호(+82)는 00700 없이 그대로 사용
  if (normalized.startsWith("+82")) {
    return normalized;
  }

  // 2) 이미 국내 형식(0으로 시작)인 번호도 그대로 사용
  if (normalized.startsWith("0")) {
    return normalized.replace(/[^\d]/g, "");
  }

  // 3) 그 외 해외번호는 + 제거 후 00700 붙이기
  normalized = normalized.replace(/^\+/, "");
  normalized = normalized.replace(/[^\d]/g, "");

  if (!normalized) return "";
  return "00700" + normalized;
}
    function escapeHtml(str) {
      return String(str || "")
        .replace(/&/g, "&amp;")
        .replace(/</g, "&lt;")
        .replace(/>/g, "&gt;")
        .replace(/"/g, "&quot;")
        .replace(/'/g, "&#39;");
    }

    function setStatus(msg) {
      statusEl.textContent = msg;
    }

    function renderFavorites(favorites) {
      const list = Array.isArray(favorites) ? favorites : [];

      if (!list.length) {
        favoritesBox.innerHTML = `
          <div class="empty">
            No shared favorites saved yet.
          </div>
        `;
        return;
      }

      const html = list.map(item => {
        const dial = sanitizeDialNumber(item.phone);
        return `
          <div class="fav-item">
            <div class="fav-main">
              <div class="fav-route-line">
                ${escapeHtml(item.icao)}: ${escapeHtml(item.fboName)} ${item.phone ? "(" + escapeHtml(item.phone) + ")" : ""}
              </div>
              <div class="fav-airport-name">${escapeHtml(item.airportName || "")}</div>
            </div>
            <div class="fav-actions">
              ${dial ? `<a class="mini-btn call-btn" href="tel:${dial}">Call</a>` : ""}
              <button class="mini-btn remove-btn" onclick="removeFavorite('${escapeHtml(item.icao)}')">Remove</button>
            </div>
          </div>
        `;
      }).join("");

      favoritesBox.innerHTML = `<div class="fav-list">${html}</div>`;
    }

    function renderResult(data) {
      if (!data || !data.ok) {
        resultEl.innerHTML = `
          <div class="empty">
            ${escapeHtml((data && data.message) || "No data found.")}
          </div>
        `;
        return;
      }

      const fboHtml = (data.fbos || []).map(item => {
        const name = item.name || "(No FBO Name)";
        const phone = item.phone || "";
        const dial = sanitizeDialNumber(phone);

        const payload = {
          icao: data.icao || "",
          airportName: data.airportName || "",
          fboName: name,
          phone: phone
        };

        const encoded = encodeURIComponent(JSON.stringify(payload));

        return `
          <div class="fbo-item">
            <div class="fbo-name">${escapeHtml(name)}</div>
            <div class="phone-text">${phone ? escapeHtml(phone) : "No phone number"}</div>
            <div class="action-row">
              ${dial ? `<a class="mini-btn call-btn" href="tel:${dial}">Call</a>` : ""}
              <button class="mini-btn fav-btn" onclick="saveSharedFavorite('${encoded}')">Add to Shared Favorites</button>
            </div>
          </div>
        `;
      }).join("");

      resultEl.innerHTML = `
        <div class="result-head">
          <div class="icao">${escapeHtml(data.icao)}</div>
          <div class="airport-name">${escapeHtml(data.airportName || "Unknown Airport")}</div>
          <div class="count">FBO count: ${data.count || 0}</div>
        </div>
        <div class="fbo-list">
          ${fboHtml || `<div class="empty">No FBO information available.</div>`}
        </div>
      `;
    }

    async function apiPost(payload) {
      const res = await fetch(SCRIPT_URL, {
        method: "POST",
        headers: {
          "Content-Type": "text/plain;charset=utf-8"
        },
        body: JSON.stringify(payload)
      });

      return await res.json();
    }

    function searchFbo() {
      const icao = icaoInput.value.trim().toUpperCase();

      if (icao.length !== 4) {
        setStatus("Please enter a 4-letter ICAO code.");
        resultEl.innerHTML = "";
        return;
      }

      setStatus("Searching...");
      resultEl.innerHTML = `
        <div class="loading-box">Searching ${escapeHtml(icao)}...</div>
      `;

      const callbackName = "jsonpSearchCallback_" + Date.now();

      window[callbackName] = function(data) {
        try {
          renderResult(data);
          setStatus(data && data.ok ? "Done." : "No result.");
        } finally {
          delete window[callbackName];
          script.remove();
        }
      };

      const script = document.createElement("script");
      script.src = `${SCRIPT_URL}?action=search&icao=${encodeURIComponent(icao)}&callback=${callbackName}`;

      script.onerror = function() {
        setStatus("Request failed.");
        resultEl.innerHTML = `
          <div class="empty">
            Failed to load data. Check the Apps Script deployment URL.
          </div>
        `;
        delete window[callbackName];
        script.remove();
      };

      document.body.appendChild(script);
    }

    function loadSharedFavorites() {
      favoritesBox.innerHTML = `
        <div class="loading-box">Loading shared favorites...</div>
      `;

      const callbackName = "jsonpFavoritesCallback_" + Date.now();

      window[callbackName] = function(data) {
        try {
          if (!data || !data.ok) {
            favoritesBox.innerHTML = `
              <div class="empty">
                Failed to load shared favorites.
              </div>
            `;
            return;
          }

          renderFavorites(data.favorites || []);
        } finally {
          delete window[callbackName];
          script.remove();
        }
      };

      const script = document.createElement("script");
      script.src = `${SCRIPT_URL}?action=favorites&callback=${callbackName}`;

      script.onerror = function() {
        favoritesBox.innerHTML = `
          <div class="empty">
            Failed to load shared favorites.
          </div>
        `;
        delete window[callbackName];
        script.remove();
      };

      document.body.appendChild(script);
    }

    async function saveSharedFavorite(encoded) {
      try {
        const item = JSON.parse(decodeURIComponent(encoded));

        const result = await apiPost({
          action: "saveFavorite",
          icao: item.icao,
          airportName: item.airportName,
          fboName: item.fboName,
          phone: item.phone
        });

        if (!result.ok) {
          alert(result.message || "Failed to save shared favorite.");
          return;
        }

        loadSharedFavorites();
        alert(`Saved: ${item.icao} - ${item.fboName}`);
      } catch (err) {
        alert("Failed to save shared favorite.");
      }
    }

    async function removeFavorite(icao) {
      try {
        const ok = confirm(`Remove shared favorite for ${icao}?`);
        if (!ok) return;

        const result = await apiPost({
          action: "removeFavorite",
          icao: icao
        });

        if (!result.ok) {
          alert(result.message || "Failed to remove favorite.");
          return;
        }

        loadSharedFavorites();
      } catch (err) {
        alert("Failed to remove favorite.");
      }
    }

    async function resetFavorites() {
      try {
        const ok = confirm("Are you sure you want to reset all shared favorites?");
        if (!ok) return;

        const result = await apiPost({
          action: "resetFavorites"
        });

        if (!result.ok) {
          alert(result.message || "Failed to reset favorites.");
          return;
        }

        loadSharedFavorites();
        alert("Shared favorites have been reset.");
      } catch (err) {
        alert("Failed to reset favorites.");
      }
    }

    searchBtn.addEventListener("click", searchFbo);

    icaoInput.addEventListener("keydown", function(e) {
      if (e.key === "Enter") searchFbo();
    });

    icaoInput.addEventListener("input", function() {
      this.value = this.value.toUpperCase().replace(/[^A-Z]/g, "").slice(0, 4);
    });

    resetFavoritesBtn.addEventListener("click", resetFavorites);

    window.saveSharedFavorite = saveSharedFavorite;
    window.removeFavorite = removeFavorite;

    loadSharedFavorites();
  </script>
</body>
</html>
