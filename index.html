<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>FBO Finder</title>

<style>
  * { box-sizing: border-box; }

  :root {
    --bg1: #eef4ff;
    --bg2: #f8fbff;
    --card: rgba(255, 255, 255, 0.82);
    --card-solid: #ffffff;
    --text: #172033;
    --muted: #6b7280;
    --line: rgba(148, 163, 184, 0.28);
    --blue: #2563eb;
    --blue2: #38bdf8;
    --navy: #1e3a8a;
    --green: #10b981;
    --amber: #f59e0b;
    --red: #ef4444;
  }

  body {
    margin: 0;
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Noto Sans KR", Arial, sans-serif;
    background:
      radial-gradient(circle at top left, rgba(59,130,246,0.22), transparent 34%),
      radial-gradient(circle at top right, rgba(16,185,129,0.16), transparent 30%),
      linear-gradient(135deg, var(--bg1), var(--bg2));
    color: var(--text);
    min-height: 100vh;
  }

  .wrap {
    max-width: 980px;
    margin: 0 auto;
    padding: 24px 12px 44px;
  }

  .card {
    position: relative;
    overflow: hidden;
    background: var(--card);
    backdrop-filter: blur(14px);
    -webkit-backdrop-filter: blur(14px);
    border: 1px solid rgba(255,255,255,0.75);
    border-radius: 24px;
    padding: 22px;
    box-shadow:
      0 20px 50px rgba(15, 23, 42, 0.10),
      inset 0 1px 0 rgba(255,255,255,0.85);
    margin-bottom: 20px;
  }

  .card::before {
    content: "";
    position: absolute;
    inset: 0 0 auto 0;
    height: 5px;
    background: linear-gradient(90deg, #2563eb, #38bdf8, #10b981);
  }

  h1, h2 {
    margin: 0 0 8px;
    letter-spacing: -0.5px;
    color: #0f172a;
  }

  h1 {
    font-size: 30px;
    font-weight: 900;
  }

  h2 {
    font-size: 23px;
    font-weight: 900;
  }

  .sub {
    margin: 0 0 18px;
    color: var(--muted);
    font-size: 14px;
    line-height: 1.55;
  }

  .title-row,
  .fav-head {
    display: flex;
    justify-content: space-between;
    align-items: center;
    gap: 12px;
    flex-wrap: wrap;
    margin-bottom: 10px;
  }

  .search-row {
    display: flex;
    gap: 10px;
    flex-wrap: wrap;
    margin-bottom: 16px;
  }

  input[type="text"] {
    flex: 1;
    min-width: 220px;
    height: 50px;
    border: 1px solid rgba(148,163,184,0.45);
    border-radius: 16px;
    padding: 0 16px;
    font-size: 17px;
    font-weight: 800;
    letter-spacing: 0.8px;
    text-transform: uppercase;
    outline: none;
    color: #0f172a;
    background:
      linear-gradient(#ffffff, #ffffff) padding-box,
      linear-gradient(135deg, rgba(37,99,235,0.55), rgba(56,189,248,0.35)) border-box;
    box-shadow:
      inset 0 1px 2px rgba(15, 23, 42, 0.05),
      0 8px 18px rgba(15, 23, 42, 0.04);
  }

  input[type="text"]:focus {
    border-color: transparent;
    box-shadow:
      0 0 0 4px rgba(37,99,235,0.13),
      0 12px 24px rgba(37,99,235,0.12);
  }

  button,
  .mini-btn {
    -webkit-tap-highlight-color: transparent;
  }

  button {
    border: none;
    border-radius: 14px;
    padding: 0 17px;
    font-size: 14px;
    font-weight: 800;
    cursor: pointer;
    transition: transform 0.15s ease, box-shadow 0.15s ease, filter 0.15s ease;
  }

  button:hover,
  .mini-btn:hover {
    transform: translateY(-1px);
    filter: brightness(1.03);
  }

  button:active,
  .mini-btn:active {
    transform: translateY(0);
  }

  .primary-btn {
    height: 50px;
    min-width: 112px;
    background: linear-gradient(135deg, #2563eb, #38bdf8);
    color: white;
    box-shadow:
      0 12px 24px rgba(37,99,235,0.26),
      inset 0 1px 0 rgba(255,255,255,0.28);
  }

  .primary-btn:hover {
    background: linear-gradient(135deg, #1d4ed8, #0ea5e9);
  }

  .soft-danger-btn {
    height: 42px;
    background: linear-gradient(135deg, #fee2e2, #fecaca);
    color: #991b1b;
    border: 1px solid rgba(248,113,113,0.35);
    box-shadow: 0 8px 18px rgba(239,68,68,0.10);
  }

  .soft-danger-btn:hover {
    background: linear-gradient(135deg, #fb7185, #ef4444);
    color: white;
  }

  .refresh-btn {
    height: 42px;
    padding: 0 15px;
    background: linear-gradient(135deg, #eef2ff, #e0f2fe);
    color: #1e40af;
    border: 1px solid rgba(99,102,241,0.22);
    border-radius: 14px;
    font-size: 13px;
    font-weight: 800;
    cursor: pointer;
    white-space: nowrap;
    box-shadow: 0 8px 18px rgba(37,99,235,0.10);
  }

  .refresh-btn:hover {
    background: linear-gradient(135deg, #dbeafe, #cffafe);
  }

  .mini-btn {
    display: inline-flex;
    align-items: center;
    justify-content: center;
    min-height: 36px;
    border: 1px solid rgba(255,255,255,0.7);
    border-radius: 12px;
    padding: 8px 13px;
    font-size: 13px;
    font-weight: 800;
    cursor: pointer;
    text-decoration: none;
    transition: transform 0.15s ease, box-shadow 0.15s ease, filter 0.15s ease;
    white-space: nowrap;
    box-shadow: 0 8px 16px rgba(15, 23, 42, 0.08);
  }

  .fav-btn {
    background: linear-gradient(135deg, #fde68a, #f59e0b);
    color: #78350f;
  }

  .remove-btn {
    background: linear-gradient(135deg, #fee2e2, #fb7185);
    color: #7f1d1d;
  }

  .call-btn {
    background: linear-gradient(135deg, #bbf7d0, #10b981);
    color: #064e3b;
  }

  .status {
    display: inline-flex;
    align-items: center;
    gap: 7px;
    margin: 8px 0 0;
    padding: 7px 11px;
    font-size: 13px;
    font-weight: 700;
    color: #475569;
    background: rgba(255,255,255,0.72);
    border: 1px solid rgba(148,163,184,0.22);
    border-radius: 999px;
  }

  .status::before {
    content: "";
    width: 8px;
    height: 8px;
    border-radius: 50%;
    background: #22c55e;
    box-shadow: 0 0 0 4px rgba(34,197,94,0.15);
  }

  .result-head {
    margin-top: 24px;
    margin-bottom: 14px;
    padding: 16px;
    border-radius: 18px;
    background: linear-gradient(135deg, rgba(239,246,255,0.92), rgba(240,253,250,0.82));
    border: 1px solid rgba(147,197,253,0.32);
  }

  .icao {
    display: inline-block;
    padding: 6px 12px;
    border-radius: 999px;
    background: linear-gradient(135deg, #2563eb, #38bdf8);
    color: white;
    font-size: 13px;
    font-weight: 900;
    margin-bottom: 10px;
    box-shadow: 0 8px 16px rgba(37,99,235,0.22);
  }

  .airport-name {
    font-size: 24px;
    font-weight: 900;
    margin: 0 0 8px;
    line-height: 1.28;
    color: #0f172a;
  }

  .count {
    color: #64748b;
    font-size: 14px;
    font-weight: 700;
  }

  .fbo-list {
    display: grid;
    gap: 13px;
    margin-top: 18px;
  }

  .fbo-item {
    position: relative;
    border: 1px solid rgba(148,163,184,0.25);
    border-radius: 18px;
    padding: 17px;
    background:
      linear-gradient(135deg, rgba(255,255,255,0.96), rgba(248,250,252,0.92));
    box-shadow:
      0 10px 24px rgba(15,23,42,0.07),
      inset 0 1px 0 rgba(255,255,255,0.9);
    transition: transform 0.15s ease, box-shadow 0.15s ease, border-color 0.15s ease;
  }

  .fbo-item:hover {
    transform: translateY(-2px);
    border-color: rgba(37,99,235,0.28);
    box-shadow:
      0 16px 34px rgba(15,23,42,0.11),
      inset 0 1px 0 rgba(255,255,255,0.9);
  }

  .fbo-name {
    font-size: 18px;
    font-weight: 900;
    margin-bottom: 8px;
    line-height: 1.35;
    color: #111827;
  }

  .phone-text {
    display: inline-block;
    font-size: 15px;
    color: #334155;
    word-break: break-all;
    margin-bottom: 13px;
    padding: 6px 10px;
    border-radius: 999px;
    background: rgba(241,245,249,0.9);
    border: 1px solid rgba(203,213,225,0.5);
  }

  .action-row {
    display: flex;
    gap: 8px;
    flex-wrap: wrap;
  }

  .empty {
    margin-top: 8px;
    padding: 16px;
    border-radius: 16px;
    background: linear-gradient(135deg, #fff7ed, #fffbeb);
    color: #9a3412;
    border: 1px solid rgba(251,146,60,0.35);
    box-shadow: 0 8px 18px rgba(251,146,60,0.08);
    font-weight: 700;
  }

  .fav-list {
    display: grid;
    gap: 11px;
  }

  .fav-item {
    display: flex;
    justify-content: space-between;
    align-items: center;
    gap: 12px;
    flex-wrap: wrap;
    border: 1px solid rgba(148,163,184,0.24);
    border-radius: 18px;
    padding: 15px;
    background:
      linear-gradient(135deg, rgba(255,255,255,0.94), rgba(239,246,255,0.76));
    box-shadow:
      0 10px 22px rgba(15,23,42,0.06),
      inset 0 1px 0 rgba(255,255,255,0.9);
    transition: transform 0.15s ease, box-shadow 0.15s ease;
  }

  .fav-item:hover {
    transform: translateY(-2px);
    box-shadow: 0 16px 32px rgba(15,23,42,0.10);
  }

  .fav-main {
    flex: 1;
    min-width: 220px;
  }

  .fav-route-line {
    font-size: 16px;
    font-weight: 900;
    margin-bottom: 5px;
    line-height: 1.35;
    color: #0f172a;
  }

  .fav-phone-line {
    display: inline-block;
    font-size: 14px;
    font-weight: 800;
    color: #334155;
    margin-bottom: 6px;
    line-height: 1.35;
  }

  .fav-airport-name {
    color: #64748b;
    font-size: 13px;
    font-weight: 600;
    line-height: 1.4;
  }

  .fav-actions {
    display: flex;
    gap: 8px;
    flex-wrap: wrap;
    align-items: center;
  }

  .footer-note {
    margin-top: 18px;
    font-size: 12px;
    color: #64748b;
    line-height: 1.6;
    padding: 12px 14px;
    border-radius: 14px;
    background: rgba(255,255,255,0.65);
    border: 1px solid rgba(148,163,184,0.18);
  }

  .loading-box {
    margin-top: 12px;
    padding: 15px;
    border-radius: 16px;
    background: linear-gradient(135deg, #eff6ff, #ecfeff);
    border: 1px solid rgba(96,165,250,0.35);
    color: #1d4ed8;
    font-size: 14px;
    font-weight: 800;
    box-shadow: 0 8px 18px rgba(37,99,235,0.08);
  }

  @media (max-width: 640px) {
    .wrap {
      padding: 14px 9px 30px;
    }

    .card {
      padding: 16px;
      border-radius: 20px;
      margin-bottom: 14px;
    }

    h1 { font-size: 25px; }
    h2 { font-size: 20px; }

    .search-row {
      gap: 9px;
    }

    input[type="text"] {
      min-width: 100%;
      height: 48px;
      font-size: 16px;
    }

    .primary-btn {
      width: 100%;
      height: 47px;
    }

    .airport-name {
      font-size: 20px;
    }

    .fbo-name {
      font-size: 16.5px;
    }

    .fav-item,
    .action-row {
      align-items: stretch;
    }

    .fav-main {
      min-width: 100%;
    }

    .fav-route-line {
      font-size: 15px;
      margin-bottom: 3px;
    }

    .fav-phone-line {
      font-size: 14px;
      margin-bottom: 6px;
    }

    .fav-actions,
    .action-row {
      width: 100%;
    }

    .fav-actions .mini-btn,
    .action-row .mini-btn {
      flex: 1;
      text-align: center;
    }

    .soft-danger-btn {
      height: 38px;
      padding: 0 12px;
      font-size: 13px;
    }

    .refresh-btn {
      height: 37px;
      padding: 0 12px;
      font-size: 12px;
    }
  }
</style>
</head>

<body>
  

  <div id="authScreen" style="
    min-height:100vh;
    display:flex;
    align-items:center;
    justify-content:center;
    padding:24px;
  background:linear-gradient(135deg,#eef4ff,#f8fbff);
    font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,'Noto Sans KR',Arial,sans-serif;
  ">
    승인 확인 중...
  </div>

  <div id="appRoot" style="display:none;">
    <div class="wrap">

      <div class="card">
        <div class="fav-head">
          <div>
            <h2>Shared Favorite FBOs</h2>
          </div>
          <button id="resetFavoritesBtn" class="soft-danger-btn">⭐ Reset Favorites</button>
        </div>
        <div id="favoritesBox"></div>
      </div>

      <div class="card">
        <div class="title-row">
          <h1>FBO Finder</h1>
          <button id="refreshBtn" class="refresh-btn" type="button">🔄 Refresh</button>
        </div>
        <p class="sub">Enter a 4-letter ICAO code to see FBO names and phone numbers.</p>

        <div class="search-row">
          <input type="text" id="icaoInput" maxlength="4" placeholder="e.g. RKSS, PANC, KEWR" />
          <button id="searchBtn" class="primary-btn">Search</button>
        </div>

        <div class="status" id="status">Ready.</div>
        <div id="result"></div>

        <div class="footer-note">
          Korean numbers (+82 / 0...) are dialed directly. Other international numbers use <b>00700</b>.
        </div>
      </div>

    </div>

    <script>
      const SCRIPT_URL = "https://script.google.com/macros/s/AKfycbx-pjjtuzqYtYy0OmNqVD6_bm5EfZNx5IWjIi8NUDE-q6tphWSDAIk2qC0xHl0rAq8K/exec";

      const icaoInput = document.getElementById("icaoInput");
      const searchBtn = document.getElementById("searchBtn");
      const statusEl = document.getElementById("status");
      const resultEl = document.getElementById("result");
      const favoritesBox = document.getElementById("favoritesBox");
      const resetFavoritesBtn = document.getElementById("resetFavoritesBtn");
      const refreshBtn = document.getElementById("refreshBtn");

      let FBO_APP_STARTED = false;

      function sanitizeDialNumber(phone) {
        if (!phone) return "";

        const raw = String(phone).trim();
        if (!raw) return "";

        let normalized = raw.replace(/[\s\-\(\)]/g, "");

        if (normalized.startsWith("+82")) {
          let local = normalized.substring(3);
          local = local.replace(/[^\d]/g, "");

          if (!local.startsWith("0")) {
            local = "0" + local;
          }
          return local;
        }

        if (normalized.startsWith("0")) {
          return normalized.replace(/[^\d]/g, "");
        }

        normalized = normalized.replace(/^\+/, "");
        normalized = normalized.replace(/[^\d]/g, "");

        if (!normalized) return "";
        return "00700" + normalized;
      }

      function escapeHtml(str) {
        return String(str || "")
          .replace(/&/g, "&amp;")
          .replace(/</g, "&lt;")
          .replace(/>/g, "&gt;")
          .replace(/"/g, "&quot;")
          .replace(/'/g, "&#39;");
      }

      function setStatus(msg) {
        statusEl.textContent = msg;
      }

      function renderFavorites(favorites) {
        const list = Array.isArray(favorites) ? favorites : [];

        if (!list.length) {
          favoritesBox.innerHTML = `
            <div class="empty">
              No shared favorites saved yet.
            </div>
          `;
          return;
        }

        const html = list.map(item => {
          const dial = sanitizeDialNumber(item.phone);

          return `
            <div class="fav-item">
              <div class="fav-main">
                <div class="fav-route-line">
                  ${escapeHtml(item.icao)}: ${escapeHtml(item.fboName)}
                </div>
                <div class="fav-phone-line">
                  ${item.phone ? `(${escapeHtml(item.phone)})` : ""}
                </div>
                <div class="fav-airport-name">${escapeHtml(item.airportName || "")}</div>
              </div>
              <div class="fav-actions">
                ${dial ? `<a class="mini-btn call-btn" href="tel:${dial}">📞 Call</a>` : ""}
               <button class="mini-btn remove-btn" onclick="removeFavorite('${escapeHtml(item.icao)}', '${escapeHtml(item.fboName)}', '${escapeHtml(item.phone || "")}')">🗑️ Remove</button>
              </div>
            </div>
          `;
        }).join("");

        favoritesBox.innerHTML = `<div class="fav-list">${html}</div>`;
      }

      function renderResult(data) {
        if (!data || !data.ok) {
          resultEl.innerHTML = `
            <div class="empty">
              ${escapeHtml((data && data.message) || "No data found.")}
            </div>
          `;
          return;
        }

        const fboHtml = (data.fbos || []).map(item => {
          const name = item.name || "(No FBO Name)";
          const phone = item.phone || "";
          const dial = sanitizeDialNumber(phone);

          const payload = {
            icao: data.icao || "",
            airportName: data.airportName || "",
            fboName: name,
            phone: phone
          };

          const encoded = encodeURIComponent(JSON.stringify(payload));

          return `
            <div class="fbo-item">
              <div class="fbo-name">${escapeHtml(name)}</div>
              <div class="phone-text">${phone ? escapeHtml(phone) : "No phone number"}</div>
              <div class="action-row">
                ${dial ? `<a class="mini-btn call-btn" href="tel:${dial}">📞 Call</a>` : ""}
                <button class="mini-btn fav-btn" onclick="saveSharedFavorite('${encoded}')">⭐ Add to Shared Favorites</button>
              </div>
            </div>
          `;
        }).join("");

        resultEl.innerHTML = `
          <div class="result-head">
            <div class="icao">${escapeHtml(data.icao)}</div>
            <div class="airport-name">${escapeHtml(data.airportName || "Unknown Airport")}</div>
            <div class="count">FBO count: ${data.count || 0}</div>
          </div>
          <div class="fbo-list">
            ${fboHtml || `<div class="empty">No FBO information available.</div>`}
          </div>
        `;
      }

      async function apiPost(payload) {
        const res = await fetch(SCRIPT_URL, {
          method: "POST",
          headers: {
            "Content-Type": "text/plain;charset=utf-8"
          },
          body: JSON.stringify(payload)
        });

        return await res.json();
      }

      function searchFbo(forceRefresh = false) {
        const icao = icaoInput.value.trim().toUpperCase();

        if (icao.length !== 4) {
          setStatus("Please enter a 4-letter ICAO code.");
          resultEl.innerHTML = "";
          return;
        }

        setStatus(forceRefresh ? "Refreshing search result..." : "Searching...");
        resultEl.innerHTML = `
          <div class="loading-box">${forceRefresh ? "Refreshing" : "Searching"} ${escapeHtml(icao)}...</div>
        `;

        const callbackName = "jsonpSearchCallback_" + Date.now();

        window[callbackName] = function(data) {
          try {
            renderResult(data);
            setStatus(data && data.ok ? (forceRefresh ? "Refreshed." : "Done.") : "No result.");
          } finally {
            delete window[callbackName];
            script.remove();
          }
        };

        const script = document.createElement("script");
       script.src = `${SCRIPT_URL}?action=search&icao=${encodeURIComponent(icao)}&force=${forceRefresh ? "1" : "0"}&callback=${callbackName}&_ts=${Date.now()}`;

        script.onerror = function() {
          setStatus("Request failed.");
          resultEl.innerHTML = `
            <div class="empty">
              Failed to load data. Check the Apps Script deployment URL.
            </div>
          `;
          delete window[callbackName];
          script.remove();
        };

        document.body.appendChild(script);
      }

      function loadSharedFavorites(forceRefresh = false) {
        favoritesBox.innerHTML = `
          <div class="loading-box">${forceRefresh ? "Refreshing" : "Loading"} shared favorites...</div>
        `;

        const callbackName = "jsonpFavoritesCallback_" + Date.now();
        const cacheBust = `_ts=${Date.now()}`;

        window[callbackName] = function(data) {
          try {
            if (!data || !data.ok) {
              favoritesBox.innerHTML = `
                <div class="empty">
                  Failed to load shared favorites.
                </div>
              `;
              return;
            }

            renderFavorites(data.favorites || []);
          } finally {
            delete window[callbackName];
            script.remove();
          }
        };

        const script = document.createElement("script");
        script.src = `${SCRIPT_URL}?action=favorites&callback=${callbackName}&${cacheBust}`;

        script.onerror = function() {
          favoritesBox.innerHTML = `
            <div class="empty">
              Failed to load shared favorites.
            </div>
          `;
          delete window[callbackName];
          script.remove();
        };

        document.body.appendChild(script);
      }

      function refreshAll() {
        setStatus("Refreshing...");

        loadSharedFavorites(true);

        const icao = icaoInput.value.trim().toUpperCase();
        if (icao.length === 4) {
          searchFbo(true);
        } else {
          setStatus("Favorites refreshed.");
        }
      }

      async function saveSharedFavorite(encoded) {
        try {
          const item = JSON.parse(decodeURIComponent(encoded));

          const result = await apiPost({
            action: "saveFavorite",
            icao: item.icao,
            airportName: item.airportName,
            fboName: item.fboName,
            phone: item.phone
          });

          if (!result.ok) {
            alert(result.message || "Failed to save shared favorite.");
            return;
          }

          loadSharedFavorites(true);
          alert(`Saved: ${item.icao} - ${item.fboName}`);
        } catch (err) {
          alert("Failed to save shared favorite.");
        }
      }

    async function removeFavorite(icao, fboName, phone) {
    try {
      const ok = confirm(`Remove shared favorite for ${icao} - ${fboName}?`);
      if (!ok) return;

      const result = await apiPost({
        action: "removeFavorite",
        icao: icao,
        fboName: fboName,
        phone: phone
      });

      if (!result.ok) {
        alert(result.message || "Failed to remove favorite.");
        return;
      }

      loadSharedFavorites(true);
    } catch (err) {
      alert("Failed to remove favorite.");
    }
  }

      async function resetFavorites() {
        try {
          const ok = confirm("Are you sure you want to reset all shared favorites?");
          if (!ok) return;

          const result = await apiPost({
            action: "resetFavorites"
          });

          if (!result.ok) {
            alert(result.message || "Failed to reset favorites.");
            return;
          }

          loadSharedFavorites(true);
          alert("Shared favorites have been reset.");
        } catch (err) {
          alert("Failed to reset favorites.");
        }
      }

      searchBtn.addEventListener("click", function() {
        searchFbo(false);
      });

      refreshBtn.addEventListener("click", refreshAll);

      icaoInput.addEventListener("keydown", function(e) {
        if (e.key === "Enter") searchFbo(false);
      });

      icaoInput.addEventListener("input", function() {
        this.value = this.value.toUpperCase().replace(/[^A-Z]/g, "").slice(0, 4);
      });

      resetFavoritesBtn.addEventListener("click", resetFavorites);

      window.saveSharedFavorite = saveSharedFavorite;
      window.removeFavorite = removeFavorite;

      function startFboAppAfterAuth() {
        if (FBO_APP_STARTED) return;
        FBO_APP_STARTED = true;
        loadSharedFavorites(false);
      }

(function waitForPortalAuth() {
  // 1) 포털에서 이미 승인된 세션이면 먼저 앱 시작
  if (sessionStorage.getItem("portalApproved") === "true") {
    startFboAppAfterAuth();
  }

  // 2) common-auth.js가 최종 승인 확인하면 통과
  if (window.CURRENT_PORTAL_USER) {
    sessionStorage.setItem("portalApproved", "true");
    startFboAppAfterAuth();
    return;
  }

  setTimeout(waitForPortalAuth, 200);
})();
