<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>FBO Finder</title>

<style>
  * { box-sizing: border-box; }

  :root {
    --bg: #f3f6fb;
    --card: #ffffff;
    --text: #111827;
    --muted: #64748b;
    --line: #e2e8f0;

    --primary: #1e40af;
    --primary-hover: #1d4ed8;
    --primary-soft: #eaf1ff;

    --success-bg: #e7f8ef;
    --success-text: #047857;

    --fav-bg: #fff4d6;
    --fav-text: #92400e;

    --danger-bg: #fee2e2;
    --danger-text: #b91c1c;
  }

  body {
    margin: 0;
    font-family: Arial, sans-serif;
    background: var(--bg);
    color: var(--text);
  }

  .wrap {
    max-width: 920px;
    margin: 0 auto;
    padding: 22px 12px 40px;
  }

.card {
  background: #fff;
  border-radius: 18px;
  padding: 18px;
  border: 1px solid #e5e7eb;
  box-shadow:
    0 10px 24px rgba(15, 23, 42, 0.05),
    0 2px 6px rgba(15, 23, 42, 0.03);
  margin-bottom: 18px;
}

  h1, h2 {
    margin: 0 0 8px;
    letter-spacing: -0.3px;
    color: #0f172a;
  }

  h1 {
    font-size: 28px;
    font-weight: 800;
  }

  h2 {
    font-size: 21px;
    font-weight: 800;
  }

  .sub {
    margin: 0 0 16px;
    color: var(--muted);
    font-size: 14px;
    line-height: 1.45;
  }
.title-row h1,
.fav-head h2 {
  display: inline-flex;
  align-items: center;
  padding: 10px 16px;
  border-radius: 14px;
  margin: 0;
  color: #ffffff;
  background: linear-gradient(135deg, #1e3a8a, #2563eb);
  box-shadow: 0 8px 18px rgba(37, 99, 235, 0.18);
  line-height: 1.1;
}

.title-row h1 {
  font-size: 28px;
}

.fav-head h2 {
  font-size: 22px;
}
  .title-row {
    display: flex;
    justify-content: space-between;
    align-items: center;
    gap: 10px;
    margin-bottom: 8px;
    flex-wrap: wrap;
  }

  .search-row {
    display: grid;
    grid-template-columns: 1fr auto;
    gap: 10px;
    margin-bottom: 14px;
  }

  input[type="text"] {
    width: 100%;
    height: 46px;
    border: 1px solid #cbd5e1;
    border-radius: 12px;
    padding: 0 14px;
    font-size: 16px;
    font-weight: 700;
    text-transform: uppercase;
    outline: none;
    background: #ffffff;
    color: #0f172a;
  }

  input[type="text"]:focus {
    border-color: var(--primary);
    box-shadow: 0 0 0 3px rgba(30, 64, 175, 0.12);
  }

button {
  border: none;
  border-radius: 12px;
  padding: 0 16px;
  font-size: 14px;
  font-weight: 700;
  cursor: pointer;
  transition: 0.15s ease;
  box-shadow:
    0 1px 0 rgba(255,255,255,0.55) inset,
    0 4px 10px rgba(15, 23, 42, 0.06);
}

button:hover,
.mini-btn:hover {
  transform: translateY(-1px);
}


  .primary-btn {
    height: 46px;
    min-width: 104px;
    background: var(--primary);
    color: white;
    box-shadow: 0 6px 14px rgba(30, 64, 175, 0.18);
  }
  
.primary-btn:hover {
  background: linear-gradient(135deg, #2563eb, #1d4ed8);
}
.soft-danger-btn {
  height: 40px;
  background: #f1f5f9;
  color: #9f1239;
  border: 1px solid #e2e8f0;
}

.soft-danger-btn:hover {
  background: #fce7f3;
  color: #9f1239;
  border-color: #fbcfe8;
}

.refresh-btn {
  height: 40px;
  padding: 0 14px;
  background: #eef4ff;
  color: #1e40af;
  border: 1px solid #c7d2fe;
  border-radius: 12px;
  font-size: 13px;
  font-weight: 700;
  cursor: pointer;
  white-space: nowrap;
}

.refresh-btn:hover {
  background: #dbeafe;
}

.mini-btn {
  display: inline-flex;
  align-items: center;
  justify-content: center;
  min-height: 34px;
  border-radius: 10px;
  padding: 7px 12px;
  font-size: 13px;
  font-weight: 700;
  cursor: pointer;
  text-decoration: none;
  transition: 0.15s ease;
  white-space: nowrap;
  border: 1px solid #dbe2ea;
  box-shadow:
    0 1px 0 rgba(255,255,255,0.55) inset,
    0 4px 10px rgba(15, 23, 42, 0.05);
}

.fav-btn {
  background: #f3ead7;
  color: #6b4e16;
  border: 1px solid #e7d7b7;
}

.fav-btn:hover {
  background: #ead8b8;
}

.remove-btn {
  background: #f8fafc;
  color: #9f1239;
  border: 1px solid #e2e8f0;
}

.remove-btn:hover {
  background: #fce7f3;
  border-color: #fbcfe8;
}
.call-btn {
  background: #eef4ff;
  color: #1d4ed8;
  border: 1px solid #bfdbfe;
}

.call-btn:hover {
  background: #dbeafe;
}
  .status {
    margin: 8px 0 0;
    font-size: 13px;
    color: var(--muted);
  }

  .result-head {
    margin-top: 20px;
    margin-bottom: 14px;
    padding-bottom: 12px;
    border-bottom: 1px solid var(--line);
  }

  .icao {
    display: inline-block;
    padding: 5px 10px;
    border-radius: 999px;
    background: var(--primary-soft);
    color: var(--primary);
    font-size: 13px;
    font-weight: 800;
    margin-bottom: 10px;
  }

  .airport-name {
    font-size: 23px;
    font-weight: 800;
    margin: 0 0 6px;
    line-height: 1.28;
    color: #0f172a;
  }

  .count {
    color: var(--muted);
    font-size: 14px;
  }

  .fbo-list {
    display: grid;
    gap: 10px;
    margin-top: 16px;
  }

  .fbo-item {
    border: 1px solid var(--line);
    border-radius: 15px;
    padding: 15px;
    background: #ffffff;
    box-shadow: 0 4px 12px rgba(15, 23, 42, 0.035);
  }

  .fbo-name {
    font-size: 17px;
    font-weight: 800;
    margin-bottom: 7px;
    line-height: 1.35;
    color: #111827;
  }

  .phone-text {
    font-size: 15px;
    color: #334155;
    word-break: break-all;
    margin-bottom: 12px;
  }

  .action-row {
    display: flex;
    gap: 8px;
    flex-wrap: wrap;
  }

  .empty {
    margin-top: 8px;
    padding: 15px;
    border-radius: 14px;
    background: #fff7ed;
    color: #9a3412;
    border: 1px solid #fed7aa;
    font-size: 14px;
  }

  .fav-head {
    display: flex;
    justify-content: space-between;
    align-items: center;
    gap: 12px;
    flex-wrap: wrap;
    margin-bottom: 12px;
  }

  .fav-list {
    display: grid;
    gap: 10px;
  }

  .fav-item {
    display: grid;
    grid-template-columns: 1fr auto;
    align-items: center;
    gap: 12px;
    border: 1px solid var(--line);
    border-radius: 15px;
    padding: 14px;
    background: #ffffff;
    box-shadow: 0 4px 12px rgba(15, 23, 42, 0.035);
  }

  .fav-main {
    min-width: 0;
  }

  .fav-route-line {
    font-size: 16px;
    font-weight: 800;
    margin-bottom: 4px;
    line-height: 1.35;
    color: #111827;
  }

  .fav-phone-line {
    font-size: 14px;
    font-weight: 700;
    color: #334155;
    margin-bottom: 5px;
    line-height: 1.35;
  }

  .fav-airport-name {
    color: var(--muted);
    font-size: 13px;
    line-height: 1.4;
  }

  .fav-actions {
    display: flex;
    gap: 8px;
    flex-wrap: wrap;
    align-items: center;
    justify-content: flex-end;
  }

  .footer-note {
    margin-top: 16px;
    font-size: 12px;
    color: var(--muted);
    line-height: 1.6;
    padding-top: 12px;
    border-top: 1px solid var(--line);
  }

  .loading-box {
    margin-top: 10px;
    padding: 14px;
    border-radius: 14px;
    background: var(--primary-soft);
    border: 1px solid #bfdbfe;
    color: var(--primary);
    font-size: 14px;
  }

  @media (max-width: 640px) {
    .wrap {
      padding: 14px 8px 28px;
    }

    .card {
      padding: 14px;
      border-radius: 16px;
      margin-bottom: 14px;
    }

    h1 { font-size: 24px; }
    h2 { font-size: 19px; }

    .search-row {
      grid-template-columns: 1fr;
    }

.primary-btn {
  height: 46px;
  background: linear-gradient(135deg, #1d4ed8, #1e40af);
  color: white;
}

    .airport-name {
      font-size: 19px;
    }

    .fbo-name {
      font-size: 16px;
    }

    .fav-item {
      grid-template-columns: 1fr;
      align-items: stretch;
    }

    .fav-actions,
    .action-row {
      width: 100%;
    }

    .fav-actions .mini-btn,
    .action-row .mini-btn {
      flex: 1;
      text-align: center;
    }

.soft-danger-btn {
  height: 40px;
  background: #f8fafc;
  color: #9f1239;
  border: 1px solid #e2e8f0;
}


    .refresh-btn {
      height: 36px;
      padding: 0 12px;
      font-size: 12px;
    }
  }
</style>

  
</head>
<body>
  <div id="authScreen" style="
    min-height:100vh;
    display:flex;
    align-items:center;
    justify-content:center;
    padding:24px;
   background:#f3f6fb;
    font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,'Noto Sans KR',Arial,sans-serif;
  ">
    승인 확인 중...
  </div>

  <div id="appRoot" style="display:none;">
    <div class="wrap">

      <div class="card">
        <div class="fav-head">
          <div>
            <h2>Shared Favorite FBOs</h2>
          </div>
          <button id="resetFavoritesBtn" class="soft-danger-btn">⭐ Reset Favorites</button>
        </div>
        <div id="favoritesBox"></div>
      </div>

      <div class="card">
        <div class="title-row">
          <h1>FBO Finder</h1>
          <button id="refreshBtn" class="refresh-btn" type="button">🔄 Refresh</button>
        </div>
        <p class="sub">Enter a 4-letter ICAO code to see FBO names and phone numbers.</p>

        <div class="search-row">
          <input type="text" id="icaoInput" maxlength="4" placeholder="e.g. RKSS, PANC, KEWR" />
          <button id="searchBtn" class="primary-btn">Search</button>
        </div>

        <div class="status" id="status">Ready.</div>
        <div id="result"></div>

        <div class="footer-note">
          Korean numbers (+82 / 0...) are dialed directly. Other international numbers use <b>00700</b>.
        </div>
      </div>

    </div>

    <script>
      const SCRIPT_URL = "https://script.google.com/macros/s/AKfycbx-pjjtuzqYtYy0OmNqVD6_bm5EfZNx5IWjIi8NUDE-q6tphWSDAIk2qC0xHl0rAq8K/exec";

      const icaoInput = document.getElementById("icaoInput");
      const searchBtn = document.getElementById("searchBtn");
      const statusEl = document.getElementById("status");
      const resultEl = document.getElementById("result");
      const favoritesBox = document.getElementById("favoritesBox");
      const resetFavoritesBtn = document.getElementById("resetFavoritesBtn");
      const refreshBtn = document.getElementById("refreshBtn");

      let FBO_APP_STARTED = false;

      function sanitizeDialNumber(phone) {
        if (!phone) return "";

        const raw = String(phone).trim();
        if (!raw) return "";

        let normalized = raw.replace(/[\s\-\(\)]/g, "");

        if (normalized.startsWith("+82")) {
          let local = normalized.substring(3);
          local = local.replace(/[^\d]/g, "");

          if (!local.startsWith("0")) {
            local = "0" + local;
          }
          return local;
        }

        if (normalized.startsWith("0")) {
          return normalized.replace(/[^\d]/g, "");
        }

        normalized = normalized.replace(/^\+/, "");
        normalized = normalized.replace(/[^\d]/g, "");

        if (!normalized) return "";
        return "00700" + normalized;
      }

      function escapeHtml(str) {
        return String(str || "")
          .replace(/&/g, "&amp;")
          .replace(/</g, "&lt;")
          .replace(/>/g, "&gt;")
          .replace(/"/g, "&quot;")
          .replace(/'/g, "&#39;");
      }

      function setStatus(msg) {
        statusEl.textContent = msg;
      }

      function renderFavorites(favorites) {
        const list = Array.isArray(favorites) ? favorites : [];

        if (!list.length) {
          favoritesBox.innerHTML = `
            <div class="empty">
              No shared favorites saved yet.
            </div>
          `;
          return;
        }

        const html = list.map(item => {
          const dial = sanitizeDialNumber(item.phone);

          return `
            <div class="fav-item">
              <div class="fav-main">
                <div class="fav-route-line">
                  ${escapeHtml(item.icao)}: ${escapeHtml(item.fboName)}
                </div>
                <div class="fav-phone-line">
                  ${item.phone ? `(${escapeHtml(item.phone)})` : ""}
                </div>
                <div class="fav-airport-name">${escapeHtml(item.airportName || "")}</div>
              </div>
              <div class="fav-actions">
                ${dial ? `<a class="mini-btn call-btn" href="tel:${dial}">📞 Call</a>` : ""}
               <button class="mini-btn remove-btn" onclick="removeFavorite('${escapeHtml(item.icao)}', '${escapeHtml(item.fboName)}', '${escapeHtml(item.phone || "")}')">🗑️ Remove</button>
              </div>
            </div>
          `;
        }).join("");

        favoritesBox.innerHTML = `<div class="fav-list">${html}</div>`;
      }

      function renderResult(data) {
        if (!data || !data.ok) {
          resultEl.innerHTML = `
            <div class="empty">
              ${escapeHtml((data && data.message) || "No data found.")}
            </div>
          `;
          return;
        }

        const fboHtml = (data.fbos || []).map(item => {
          const name = item.name || "(No FBO Name)";
          const phone = item.phone || "";
          const dial = sanitizeDialNumber(phone);

          const payload = {
            icao: data.icao || "",
            airportName: data.airportName || "",
            fboName: name,
            phone: phone
          };

          const encoded = encodeURIComponent(JSON.stringify(payload));

          return `
            <div class="fbo-item">
              <div class="fbo-name">${escapeHtml(name)}</div>
              <div class="phone-text">${phone ? escapeHtml(phone) : "No phone number"}</div>
              <div class="action-row">
                ${dial ? `<a class="mini-btn call-btn" href="tel:${dial}">📞 Call</a>` : ""}
                <button class="mini-btn fav-btn" onclick="saveSharedFavorite('${encoded}')">⭐ Add to Shared Favorites</button>
              </div>
            </div>
          `;
        }).join("");

        resultEl.innerHTML = `
          <div class="result-head">
            <div class="icao">${escapeHtml(data.icao)}</div>
            <div class="airport-name">${escapeHtml(data.airportName || "Unknown Airport")}</div>
            <div class="count">FBO count: ${data.count || 0}</div>
          </div>
          <div class="fbo-list">
            ${fboHtml || `<div class="empty">No FBO information available.</div>`}
          </div>
        `;
      }

      async function apiPost(payload) {
        const res = await fetch(SCRIPT_URL, {
          method: "POST",
          headers: {
            "Content-Type": "text/plain;charset=utf-8"
          },
          body: JSON.stringify(payload)
        });

        return await res.json();
      }

      function searchFbo(forceRefresh = false) {
        const icao = icaoInput.value.trim().toUpperCase();

        if (icao.length !== 4) {
          setStatus("Please enter a 4-letter ICAO code.");
          resultEl.innerHTML = "";
          return;
        }

        setStatus(forceRefresh ? "Refreshing search result..." : "Searching...");
        resultEl.innerHTML = `
          <div class="loading-box">${forceRefresh ? "Refreshing" : "Searching"} ${escapeHtml(icao)}...</div>
        `;

        const callbackName = "jsonpSearchCallback_" + Date.now();

        window[callbackName] = function(data) {
          try {
            renderResult(data);
            setStatus(data && data.ok ? (forceRefresh ? "Refreshed." : "Done.") : "No result.");
          } finally {
            delete window[callbackName];
            script.remove();
          }
        };

        const script = document.createElement("script");
       script.src = `${SCRIPT_URL}?action=search&icao=${encodeURIComponent(icao)}&force=${forceRefresh ? "1" : "0"}&callback=${callbackName}&_ts=${Date.now()}`;

        script.onerror = function() {
          setStatus("Request failed.");
          resultEl.innerHTML = `
            <div class="empty">
              Failed to load data. Check the Apps Script deployment URL.
            </div>
          `;
          delete window[callbackName];
          script.remove();
        };

        document.body.appendChild(script);
      }

      function loadSharedFavorites(forceRefresh = false) {
        favoritesBox.innerHTML = `
          <div class="loading-box">${forceRefresh ? "Refreshing" : "Loading"} shared favorites...</div>
        `;

        const callbackName = "jsonpFavoritesCallback_" + Date.now();
        const cacheBust = `_ts=${Date.now()}`;

        window[callbackName] = function(data) {
          try {
            if (!data || !data.ok) {
              favoritesBox.innerHTML = `
                <div class="empty">
                  Failed to load shared favorites.
                </div>
              `;
              return;
            }

            renderFavorites(data.favorites || []);
          } finally {
            delete window[callbackName];
            script.remove();
          }
        };

        const script = document.createElement("script");
        script.src = `${SCRIPT_URL}?action=favorites&callback=${callbackName}&${cacheBust}`;

        script.onerror = function() {
          favoritesBox.innerHTML = `
            <div class="empty">
              Failed to load shared favorites.
            </div>
          `;
          delete window[callbackName];
          script.remove();
        };

        document.body.appendChild(script);
      }

      function refreshAll() {
        setStatus("Refreshing...");

        loadSharedFavorites(true);

        const icao = icaoInput.value.trim().toUpperCase();
        if (icao.length === 4) {
          searchFbo(true);
        } else {
          setStatus("Favorites refreshed.");
        }
      }

      async function saveSharedFavorite(encoded) {
        try {
          const item = JSON.parse(decodeURIComponent(encoded));

          const result = await apiPost({
            action: "saveFavorite",
            icao: item.icao,
            airportName: item.airportName,
            fboName: item.fboName,
            phone: item.phone
          });

          if (!result.ok) {
            alert(result.message || "Failed to save shared favorite.");
            return;
          }

          loadSharedFavorites(true);
          alert(`Saved: ${item.icao} - ${item.fboName}`);
        } catch (err) {
          alert("Failed to save shared favorite.");
        }
      }

    async function removeFavorite(icao, fboName, phone) {
    try {
      const ok = confirm(`Remove shared favorite for ${icao} - ${fboName}?`);
      if (!ok) return;

      const result = await apiPost({
        action: "removeFavorite",
        icao: icao,
        fboName: fboName,
        phone: phone
      });

      if (!result.ok) {
        alert(result.message || "Failed to remove favorite.");
        return;
      }

      loadSharedFavorites(true);
    } catch (err) {
      alert("Failed to remove favorite.");
    }
  }

      async function resetFavorites() {
        try {
          const ok = confirm("Are you sure you want to reset all shared favorites?");
          if (!ok) return;

          const result = await apiPost({
            action: "resetFavorites"
          });

          if (!result.ok) {
            alert(result.message || "Failed to reset favorites.");
            return;
          }

          loadSharedFavorites(true);
          alert("Shared favorites have been reset.");
        } catch (err) {
          alert("Failed to reset favorites.");
        }
      }

      searchBtn.addEventListener("click", function() {
        searchFbo(false);
      });

      refreshBtn.addEventListener("click", refreshAll);

      icaoInput.addEventListener("keydown", function(e) {
        if (e.key === "Enter") searchFbo(false);
      });

      icaoInput.addEventListener("input", function() {
        this.value = this.value.toUpperCase().replace(/[^A-Z]/g, "").slice(0, 4);
      });

      resetFavoritesBtn.addEventListener("click", resetFavorites);

      window.saveSharedFavorite = saveSharedFavorite;
      window.removeFavorite = removeFavorite;

      function startFboAppAfterAuth() {
        if (FBO_APP_STARTED) return;
        FBO_APP_STARTED = true;
        loadSharedFavorites(false);
      }

(function waitForPortalAuth() {
  // 1) 포털에서 이미 승인된 세션이면 먼저 앱 시작
  if (sessionStorage.getItem("portalApproved") === "true") {
    startFboAppAfterAuth();
  }

  // 2) common-auth.js가 최종 승인 확인하면 통과
  if (window.CURRENT_PORTAL_USER) {
    sessionStorage.setItem("portalApproved", "true");
    startFboAppAfterAuth();
    return;
  }

  setTimeout(waitForPortalAuth, 200);
})();
    </script>
  </div>

  <script src="https://accounts.google.com/gsi/client" async defer></script>
  <script src="https://bomi87.github.io/SK-Aviation-portal/common-auth.js"></script>
</body>
</html>
