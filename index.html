<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>FBO Finder</title>
  <style>
    * { box-sizing: border-box; }

    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: #f5f7fb;
      color: #1f2937;
    }

    .wrap {
      max-width: 980px;
      margin: 0 auto;
      padding: 20px 12px 40px;
    }

    .card {
      background: #fff;
      border-radius: 18px;
      padding: 18px;
      box-shadow: 0 8px 24px rgba(0,0,0,0.06);
      margin-bottom: 18px;
    }

    h1, h2 {
      margin: 0 0 8px;
      letter-spacing: -0.2px;
    }

    h1 { font-size: 28px; }
    h2 { font-size: 22px; }

    .sub {
      margin: 0 0 16px;
      color: #6b7280;
      font-size: 14px;
      line-height: 1.45;
    }

    .search-row {
      display: flex;
      gap: 10px;
      flex-wrap: wrap;
      margin-bottom: 16px;
    }

    input[type="text"] {
      flex: 1;
      min-width: 220px;
      height: 46px;
      border: 1px solid #d1d5db;
      border-radius: 14px;
      padding: 0 14px;
      font-size: 16px;
      text-transform: uppercase;
      outline: none;
    }

    input[type="text"]:focus {
      border-color: #94a3b8;
      box-shadow: 0 0 0 3px rgba(148,163,184,0.12);
    }

    button {
      border: none;
      border-radius: 12px;
      padding: 0 16px;
      font-size: 14px;
      font-weight: 700;
      cursor: pointer;
      transition: 0.15s ease;
    }

    .primary-btn {
      height: 46px;
      background: #3b82f6;
      color: white;
    }

    .primary-btn:hover {
      background: #2563eb;
    }

    .soft-danger-btn {
      height: 40px;
      background: #fca5a5;
      color: #7f1d1d;
    }

    .soft-danger-btn:hover {
      background: #f87171;
      color: white;
    }

    .mini-btn {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      min-height: 34px;
      border: none;
      border-radius: 10px;
      padding: 7px 12px;
      font-size: 13px;
      font-weight: 700;
      cursor: pointer;
      text-decoration: none;
      transition: 0.15s ease;
      white-space: nowrap;
    }

    .fav-btn {
      background: #fcd34d;
      color: #78350f;
    }

    .fav-btn:hover {
      background: #fbbf24;
    }

    .remove-btn {
      background: #fecaca;
      color: #991b1b;
    }

    .remove-btn:hover {
      background: #fca5a5;
    }

    .call-btn {
      background: #a7f3d0;
      color: #065f46;
    }

    .call-btn:hover {
      background: #6ee7b7;
    }

    .status {
      margin: 8px 0 0;
      font-size: 14px;
      color: #6b7280;
    }

    .result-head {
      margin-top: 22px;
      margin-bottom: 14px;
    }

    .icao {
      display: inline-block;
      padding: 5px 10px;
      border-radius: 999px;
      background: #dbeafe;
      color: #2563eb;
      font-size: 13px;
      font-weight: 700;
      margin-bottom: 10px;
    }

    .airport-name {
      font-size: 24px;
      font-weight: 800;
      margin: 0 0 8px;
      line-height: 1.28;
    }

    .count {
      color: #6b7280;
      font-size: 14px;
    }

    .fbo-list {
      display: grid;
      gap: 12px;
      margin-top: 18px;
    }

    .fbo-item {
      border: 1px solid #e5e7eb;
      border-radius: 16px;
      padding: 16px;
      background: #fafafa;
    }

    .fbo-name {
      font-size: 17px;
      font-weight: 800;
      margin-bottom: 8px;
      line-height: 1.35;
    }

    .phone-text {
      font-size: 15px;
      color: #111827;
      word-break: break-all;
      margin-bottom: 12px;
    }

    .action-row {
      display: flex;
      gap: 8px;
      flex-wrap: wrap;
    }

    .empty {
      margin-top: 8px;
      padding: 16px;
      border-radius: 14px;
      background: #fff7ed;
      color: #9a3412;
      border: 1px solid #fdba74;
    }

    .fav-head {
      display: flex;
      justify-content: space-between;
      align-items: flex-start;
      gap: 10px;
      flex-wrap: wrap;
      margin-bottom: 12px;
    }

    .fav-list {
      display: grid;
      gap: 10px;
    }

    .fav-item {
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 12px;
      flex-wrap: wrap;
      border: 1px solid #e5e7eb;
      border-radius: 16px;
      padding: 14px;
      background: #f9fafb;
    }

    .fav-main {
      flex: 1;
      min-width: 220px;
    }

    .fav-route-line {
      font-size: 16px;
      font-weight: 800;
      margin-bottom: 4px;
      line-height: 1.35;
    }

    .fav-phone-line {
      font-size: 15px;
      font-weight: 700;
      color: #374151;
      margin-bottom: 6px;
      line-height: 1.35;
    }

    .fav-airport-name {
      color: #6b7280;
      font-size: 13px;
      line-height: 1.4;
    }

    .fav-actions {
      display: flex;
      gap: 8px;
      flex-wrap: wrap;
      align-items: center;
    }

    .footer-note {
      margin-top: 18px;
      font-size: 12px;
      color: #6b7280;
      line-height: 1.6;
    }

    .loading-box {
      margin-top: 10px;
      padding: 14px;
      border-radius: 14px;
      background: #eff6ff;
      border: 1px solid #bfdbfe;
      color: #1d4ed8;
      font-size: 14px;
    }

    @media (max-width: 640px) {
      .wrap {
        padding: 14px 8px 28px;
      }

      .card {
        padding: 14px;
        border-radius: 16px;
      }

      h1 { font-size: 24px; }
      h2 { font-size: 19px; }

      .airport-name {
        font-size: 19px;
      }

      .fbo-name {
        font-size: 16px;
      }

      .fav-item,
      .action-row {
        align-items: stretch;
      }

      .fav-main {
        min-width: 100%;
      }

      .fav-route-line {
        font-size: 15px;
        margin-bottom: 3px;
      }

      .fav-phone-line {
        font-size: 14px;
        margin-bottom: 6px;
      }

      .fav-actions,
      .action-row {
        width: 100%;
      }

      .fav-actions .mini-btn,
      .action-row .mini-btn {
        flex: 1;
        text-align: center;
      }

      .soft-danger-btn {
        height: 38px;
        padding: 0 12px;
        font-size: 13px;
      }
    }
  </style>
</head>
<body>
  <div class="wrap">

    <div class="card">
      <div class="fav-head">
        <div>
          <h2>Shared Favorites Route</h2>
          <div class="sub" style="margin:0;">
            Shared favorites are visible to everyone using this page.
          </div>
        </div>
        <button id="resetFavoritesBtn" class="soft-danger-btn">⭐ Reset Favorites</button>
      </div>
      <div id="favoritesBox"></div>
    </div>

    <div class="card">
      <h1>FBO Finder</h1>
      <p class="sub">Enter a 4-letter ICAO code to see FBO names and phone numbers.</p>

      <div class="search-row">
        <input type="text" id="icaoInput" maxlength="4" placeholder="e.g. RKSS, PANC, KEWR" />
        <button id="searchBtn" class="primary-btn">Search</button>
      </div>

      <div class="status" id="status">Ready.</div>
      <div id="result"></div>

      <div class="footer-note">
        Korean numbers (+82 / 0...) are dialed directly. Other international numbers use <b>00700</b>.
      </div>
    </div>

  </div>

  <script>
    const SCRIPT_URL = "https://script.google.com/macros/s/AKfycbwR5WaX79FuH4SihUMo68ggrirel-hcRzekMvud_r6MLdsD3jrkpA9LqwkVzVRwvr6n/exec";

    const icaoInput = document.getElementById("icaoInput");
    const searchBtn = document.getElementById("searchBtn");
    const statusEl = document.getElementById("status");
    const resultEl = document.getElementById("result");
    const favoritesBox = document.getElementById("favoritesBox");
    const resetFavoritesBtn = document.getElementById("resetFavoritesBtn");

    function sanitizeDialNumber(phone) {
      if (!phone) return "";

      const raw = String(phone).trim();
      if (!raw) return "";

      let normalized = raw.replace(/[\s\-\(\)]/g, "");

      if (normalized.startsWith("+82")) {
        return normalized;
      }

      if (normalized.startsWith("0")) {
        return normalized.replace(/[^\d]/g, "");
      }

      normalized = normalized.replace(/^\+/, "");
      normalized = normalized.replace(/[^\d]/g, "");

      if (!normalized) return "";
      return "00700" + normalized;
    }

    function escapeHtml(str) {
      return String(str || "")
        .replace(/&/g, "&amp;")
        .replace(/</g, "&lt;")
        .replace(/>/g, "&gt;")
        .replace(/"/g, "&quot;")
        .replace(/'/g, "&#39;");
    }

    function setStatus(msg) {
      statusEl.textContent = msg;
    }

    function renderFavorites(favorites) {
      const list = Array.isArray(favorites) ? favorites : [];

      if (!list.length) {
        favoritesBox.innerHTML = `
          <div class="empty">
            No shared favorites saved yet.
          </div>
        `;
        return;
      }

      const html = list.map(item => {
        const dial = sanitizeDialNumber(item.phone);

        return `
          <div class="fav-item">
            <div class="fav-main">
              <div class="fav-route-line">
                ${escapeHtml(item.icao)}: ${escapeHtml(item.fboName)}
              </div>
              <div class="fav-phone-line">
                ${item.phone ? `(${escapeHtml(item.phone)})` : ""}
              </div>
              <div class="fav-airport-name">${escapeHtml(item.airportName || "")}</div>
            </div>
            <div class="fav-actions">
              ${dial ? `<a class="mini-btn call-btn" href="tel:${dial}">📞 Call</a>` : ""}
              <button class="mini-btn remove-btn" onclick="removeFavorite('${escapeHtml(item.icao)}')">🗑️ Remove</button>
            </div>
          </div>
        `;
      }).join("");

      favoritesBox.innerHTML = `<div class="fav-list">${html}</div>`;
    }

    function renderResult(data) {
      if (!data || !data.ok) {
        resultEl.innerHTML = `
          <div class="empty">
            ${escapeHtml((data && data.message) || "No data found.")}
          </div>
        `;
        return;
      }

      const fboHtml = (data.fbos || []).map(item => {
        const name = item.name || "(No FBO Name)";
        const phone = item.phone || "";
        const dial = sanitizeDialNumber(phone);

        const payload = {
          icao: data.icao || "",
          airportName: data.airportName || "",
          fboName: name,
          phone: phone
        };

        const encoded = encodeURIComponent(JSON.stringify(payload));

        return `
          <div class="fbo-item">
            <div class="fbo-name">${escapeHtml(name)}</div>
            <div class="phone-text">${phone ? escapeHtml(phone) : "No phone number"}</div>
            <div class="action-row">
              ${dial ? `<a class="mini-btn call-btn" href="tel:${dial}">📞 Call</a>` : ""}
              <button class="mini-btn fav-btn" onclick="saveSharedFavorite('${encoded}')">⭐ Add to Shared Favorites</button>
            </div>
          </div>
        `;
      }).join("");

      resultEl.innerHTML = `
        <div class="result-head">
          <div class="icao">${escapeHtml(data.icao)}</div>
          <div class="airport-name">${escapeHtml(data.airportName || "Unknown Airport")}</div>
          <div class="count">FBO count: ${data.count || 0}</div>
        </div>
        <div class="fbo-list">
          ${fboHtml || `<div class="empty">No FBO information available.</div>`}
        </div>
      `;
    }

    async function apiPost(payload) {
      const res = await fetch(SCRIPT_URL, {
        method: "POST",
        headers: {
          "Content-Type": "text/plain;charset=utf-8"
        },
        body: JSON.stringify(payload)
      });

      return await res.json();
    }

    function searchFbo() {
      const icao = icaoInput.value.trim().toUpperCase();

      if (icao.length !== 4) {
        setStatus("Please enter a 4-letter ICAO code.");
        resultEl.innerHTML = "";
        return;
      }

      setStatus("Searching...");
      resultEl.innerHTML = `
        <div class="loading-box">Searching ${escapeHtml(icao)}...</div>
      `;

      const callbackName = "jsonpSearchCallback_" + Date.now();

      window[callbackName] = function(data) {
        try {
          renderResult(data);
          setStatus(data && data.ok ? "Done." : "No result.");
        } finally {
          delete window[callbackName];
          script.remove();
        }
      };

      const script = document.createElement("script");
      script.src = `${SCRIPT_URL}?action=search&icao=${encodeURIComponent(icao)}&callback=${callbackName}`;

      script.onerror = function() {
        setStatus("Request failed.");
        resultEl.innerHTML = `
          <div class="empty">
            Failed to load data. Check the Apps Script deployment URL.
          </div>
        `;
        delete window[callbackName];
        script.remove();
      };

      document.body.appendChild(script);
    }

    function loadSharedFavorites() {
      favoritesBox.innerHTML = `
        <div class="loading-box">Loading shared favorites...</div>
      `;

      const callbackName = "jsonpFavoritesCallback_" + Date.now();

      window[callbackName] = function(data) {
        try {
          if (!data || !data.ok) {
            favoritesBox.innerHTML = `
              <div class="empty">
                Failed to load shared favorites.
              </div>
            `;
            return;
          }

          renderFavorites(data.favorites || []);
        } finally {
          delete window[callbackName];
          script.remove();
        }
      };

      const script = document.createElement("script");
      script.src = `${SCRIPT_URL}?action=favorites&callback=${callbackName}`;

      script.onerror = function() {
        favoritesBox.innerHTML = `
          <div class="empty">
            Failed to load shared favorites.
          </div>
        `;
        delete window[callbackName];
        script.remove();
      };

      document.body.appendChild(script);
    }

    async function saveSharedFavorite(encoded) {
      try {
        const item = JSON.parse(decodeURIComponent(encoded));

        const result = await apiPost({
          action: "saveFavorite",
          icao: item.icao,
          airportName: item.airportName,
          fboName: item.fboName,
          phone: item.phone
        });

        if (!result.ok) {
          alert(result.message || "Failed to save shared favorite.");
          return;
        }

        loadSharedFavorites();
        alert(`Saved: ${item.icao} - ${item.fboName}`);
      } catch (err) {
        alert("Failed to save shared favorite.");
      }
    }

    async function removeFavorite(icao) {
      try {
        const ok = confirm(`Remove shared favorite for ${icao}?`);
        if (!ok) return;

        const result = await apiPost({
          action: "removeFavorite",
          icao: icao
        });

        if (!result.ok) {
          alert(result.message || "Failed to remove favorite.");
          return;
        }

        loadSharedFavorites();
      } catch (err) {
        alert("Failed to remove favorite.");
      }
    }

    async function resetFavorites() {
      try {
        const ok = confirm("Are you sure you want to reset all shared favorites?");
        if (!ok) return;

        const result = await apiPost({
          action: "resetFavorites"
        });

        if (!result.ok) {
          alert(result.message || "Failed to reset favorites.");
          return;
        }

        loadSharedFavorites();
        alert("Shared favorites have been reset.");
      } catch (err) {
        alert("Failed to reset favorites.");
      }
    }

    searchBtn.addEventListener("click", searchFbo);

    icaoInput.addEventListener("keydown", function(e) {
      if (e.key === "Enter") searchFbo();
    });

    icaoInput.addEventListener("input", function() {
      this.value = this.value.toUpperCase().replace(/[^A-Z]/g, "").slice(0, 4);
    });

    resetFavoritesBtn.addEventListener("click", resetFavorites);

    window.saveSharedFavorite = saveSharedFavorite;
    window.removeFavorite = removeFavorite;

    loadSharedFavorites();
  </script>
</body>
</html>
